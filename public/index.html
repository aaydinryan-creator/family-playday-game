<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PLAYDAY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="menuScreen" class="screen">
  <div class="panel glamPanel">
    <h1 class="gameTitle">PLAYDAY</h1>

    <input id="nameInput" placeholder="Your name" />
    <input id="roomCodeInput" placeholder="Room Code (optional)" />

    <div id="avatarPreview"></div>
    <div id="emojiChoices"></div>
    <div id="hatChoices"></div>
    <div id="colorChoices"></div>

    <div class="buttonRow">
      <button id="createRoomBtn" class="primaryBtn">Create Room</button>
      <button id="joinRoomBtn" class="secondaryBtn">Join Room</button>
    </div>

    <div id="message" class="message"></div>
  </div>
</div>

<div id="lobbyScreen" class="screen hidden">
  <div class="panel lobbyPanel">
    <h2>Room: <span id="roomCodeDisplay"></span></h2>

    <ul id="playerList"></ul>

    <button id="startGameBtn" class="primaryBtn hidden">Start Game</button>
    <button id="leaveLobbyBtn" class="secondaryBtn">Leave</button>

    <div id="lobbyChatList" class="chatList"></div>
    <div class="chatInputRow">
      <input id="lobbyChatInput" placeholder="Chat..." />
      <button id="sendLobbyChatBtn">Send</button>
    </div>

    <div id="lobbyMessage"></div>
  </div>
</div>

<div id="gameScreen" class="screen hidden">

  <div class="gameShell">

    <!-- LEFT -->
    <div class="sidePanel">
      <div>Room: <span id="gameRoomCodeShort"></span></div>
      <div>Bank: <span id="bankAmount"></span></div>
      <div>Turn: <span id="currentTurnText"></span></div>
      <div id="turnInfoText"></div>

      <button id="rollTurnBtn" class="primaryBtn">Roll Turn</button>
      <button id="musicToggleBtn">Music: OFF</button>

      <div id="gamePlayersList"></div>
    </div>

    <!-- BOARD -->
    <div class="boardArea">
      <div id="boardWrap">
        <div id="gameBoard">
          <div class="boardGrid" id="boardGrid">
            <!-- tiles should already exist in your original html -->
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="sidePanel">
      <div id="gameChatList" class="chatList"></div>
      <div class="chatInputRow">
        <input id="gameChatInput" placeholder="Chat..." />
        <button id="sendGameChatBtn">Send</button>
      </div>
    </div>

  </div>
</div>

<!-- Dice Overlay -->
<div id="sharedDiceOverlay" class="hidden">
  <div>
    <h2 id="sharedDiceTitle"></h2>
    <div id="sharedDiceCube" class="dice"></div>
    <div id="sharedDiceValue"></div>
  </div>
</div>

<!-- Event Popup -->
<div id="eventPopup" class="hidden">
  <h3 id="eventTitle"></h3>
  <p id="eventMessage"></p>
</div>

<!-- Card Reveal -->
<div id="revealOverlay" class="hidden">
  <div id="revealPlayer"></div>
  <div id="revealCount"></div>

  <div id="revealCard" class="flipCard">
    <div class="flipCardInner">
      <div class="flipCardFace flipCardBack">
        <div class="cardBackTitle">CARD</div>
      </div>
      <div class="flipCardFace flipCardFront">
        <div id="revealFrontTitle"></div>
        <div id="revealFrontText"></div>
        <div id="revealAmount"></div>
      </div>
    </div>
  </div>
</div>

<!-- PLAYDAY -->
<div id="playdayOverlay" class="hidden">
  <h1 id="playdayTitle"></h1>
  <p id="playdayText"></p>
  <div id="playdayRain"></div>
</div>

<audio id="bgMusic" src="money.mp3" loop></audio>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
